  <!-- ═══ LAYOUT ═══ -->
  <div class="c-app" id="app-layout">

    <nav class="c-app__sidebar" id="sidebar-nav">
      <div class="c-sidebar__brand">
        <div class="c-sidebar__logo">
          <svg><use xlink:href="#logo-crab-claw"/></svg>
        </div>
        <div class="c-sidebar__brand-text">
          <div class="c-sidebar__title">NovelClaw</div>
          <div class="c-sidebar__subtitle">โลกของนักอ่าน ไม่สิ้นสุด</div>
        </div>
        <button class="c-btn c-btn--icon c-sidebar__close" id="sidebar-close" aria-label="ปิดเมนู" type="button">
          <svg style="width:14px;height:14px;"><use xlink:href="#icon-close"/></svg>
        </button>
      </div>

      <div class="c-sidebar__nav">
        <div class="c-nav-divider"></div>
        <button class="c-nav-item c-nav-item--active" data-page="home" type="button" aria-current="page" aria-label="หน้าหลัก">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-home"/></svg> หน้าหลัก

        <button class="c-nav-item" data-page="library" type="button" aria-label="หอสมุด">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-library"/></svg> หอสมุด
        </button>
        <button class="c-nav-item" data-page="search" type="button" aria-label="ค้นหา">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-search"/></svg> ค้นหา
        </button>
        <button class="c-nav-item" data-page="ranking" type="button" aria-label="อันดับ">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-ranking"/></svg> อันดับ
        </button>
        <hr class="c-nav-hr">
        <button class="c-nav-item" data-page="profile" type="button" aria-label="โปรไฟล์">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-profile"/></svg> โปรไฟล์

        <button class="c-nav-item" data-page="history" type="button" aria-label="ประวัติการอ่าน">

        </button>
        <button class="c-nav-item" data-page="bookmarks" type="button" aria-label="บุ๊กมาร์ก">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-bookmarks"/></svg> บุ๊กมาร์ก
        </button>
        <hr class="c-nav-hr">
        <button class="c-nav-item" data-page="settings" type="button" aria-label="ตั้งค่า">
          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-settings"/></svg> ตั้งค่า
        </button>
        <hr class="c-nav-hr">

          <svg class="c-nav-item__icon" aria-hidden="true"><use xlink:href="#icon-shield"/></svg> จัดการ
        </button>

      <div class="c-sidebar__toggles">
        <div class="c-toggle__row">
          <span class="c-toggle__label">
            <svg style="width:16px;height:16px;"><use xlink:href="#icon-moon"/></svg> โหมดกลางคืน
          </span>
          <div class="c-toggle c-toggle--active" id="theme-toggle-new"></div>
        </div>
        <a href="#admin/jobs" class="c-toggle__row" data-nav style="text-decoration:none;color:inherit;cursor:pointer;">
          <span class="c-toggle__label">
            <svg style="width:16px;height:16px;"><use xlink:href="#icon-book"/></svg> คิวแปล AI
          </span>
          <span style="font-size:10px;color:var(--c-accent);">→</span>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="c-app__main">
      <div class="c-header">
        <div class="c-header__left">
          <button class="c-btn c-btn--icon" id="sidebar-toggle" aria-label="สลับแถบเมนู" type="button">
            <svg style="width:18px;height:18px;"><use xlink:href="#icon-hamburger"/></svg>
          </button>
          <span class="c-header__title" id="page-title">หน้าหลัก</span>
        </div>
        <div class="c-header__right">
          <div class="c-header__status">
            <span class="c-status-dot c-status-dot--online"></span>
          </div>
          <button class="c-btn c-btn--icon" id="notif-btn" aria-label="การแจ้งเตือน" type="button">
            <svg style="width:18px;height:18px;"><use xlink:href="#icon-bell"/></svg>
          </button>
          <div class="c-avatar" id="profile-avatar"></div>
        </div>
      </div>

      <div class="c-content">
        <div class="page page--active" id="page-home"></div>
        <div class="page" id="page-novel-detail"></div>

        <div class="page" id="page-admin-logs"></div>
        <div class="page" id="page-admin-glossary"></div>
        <div class="page" id="page-admin-translate"></div>
        <div class="page" id="page-admin-import"></div>
      </div>
    </main>

            <div class="c-rc__item">กำลังโหลด...</div>
          </div>
        </div>

    </aside>
