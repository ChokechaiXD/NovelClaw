<body data-theme="dark">
  <!-- SVG Symbols Sprite Library -->

    <symbol id="logo-crab-claw" viewBox="0 0 32 32">
      <defs>
        <linearGradient id="logo-crab-grad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.95" />
          <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.95" />
        </linearGradient>
      </defs>
      <!-- Book -->
      <g transform="rotate(-8 18 16)">
        <rect x="13" y="7" width="12" height="18" rx="2" fill="#a78bfa" />
        <rect x="11.5" y="7" width="1.5" height="18" rx="0.5" fill="#8b5cf6" />
        <rect x="14.5" y="8" width="9.5" height="16" rx="1" fill="#fffdf5" />
        <line x1="16.5" y1="12" x2="21.5" y2="12" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round" />

      <!-- Eye -->
      <circle cx="11.5" cy="14" r="1.5" fill="#1e293b" />
      <circle cx="11" cy="13.5" r="0.5" fill="#ffffff" />

      <ellipse cx="12.5" cy="15" rx="1" ry="0.5" fill="#ff8da1" opacity="0.8" />

    <symbol id="icon-ranking" viewBox="0 0 24 24">
      <path d="M6 9l6-6 6 6M6 9v10M6 9H4m2 0h2m10 0v10m0-10h2m-2 0h-2M8 21h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-profile" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 21a8 8 0 00-16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-history" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">

    </symbol>
    <symbol id="icon-shield" viewBox="0 0 24 24">
      <path d="M12 2l7 4v5c0 5-3.5 9.7-7 11-3.5-1.3-7-6-7-11V6l7-4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <symbol id="icon-crown" viewBox="0 0 24 24">
      <path d="M2 19h20M4 10l3 3 5-8 5 8 3-3-1 9H5L4 10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Utility Icons -->
    <symbol id="icon-hamburger" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <path d="M15 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
    <symbol id="icon-arrow-right" viewBox="0 0 24 24">
      <path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2" />
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5v-15z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
    <symbol id="icon-minus" viewBox="0 0 24 24">
      <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </symbol>
    <symbol id="icon-fullscreen" viewBox="0 0 24 24">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <symbol id="icon-bookmark-outline" viewBox="0 0 24 24">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- Bookmark (filled) -->
    <symbol id="icon-bookmarks" viewBox="0 0 24 24">
      <path d="M7 3h10a2 2 0 0 1 2 2v16l-7-5-7 5V5a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- Mascot: Hermit Crab Normal -->
    <symbol id="mascot-crab" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="mc-body" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#e85d4a" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#f0936b" stop-opacity="0.5"/>
        </linearGradient>
        <linearGradient id="mc-shell" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.25"/>
        </linearGradient>
      </defs>
      <!-- Shell (round body) -->
      <ellipse cx="40" cy="48" rx="24" ry="20" fill="url(#mc-shell)" stroke="var(--border)" stroke-width="1"/>
      <!-- Head -->
      <circle cx="40" cy="32" r="14" fill="url(#mc-body)" stroke="var(--border-strong)" stroke-width="0.8"/>
      <!-- Eyes -->
      <circle cx="34" cy="30" r="3" fill="var(--text)"/>
      <circle cx="46" cy="30" r="3" fill="var(--text)"/>
      <circle cx="35" cy="29" r="1.2" fill="var(--bg)"/>
      <circle cx="47" cy="29" r="1.2" fill="var(--bg)"/>
      <!-- Blush -->
      <ellipse cx="28" cy="35" rx="3" ry="1.5" fill="#e85d4a" opacity="0.3"/>
      <ellipse cx="52" cy="35" rx="3" ry="1.5" fill="#e85d4a" opacity="0.3"/>
      <!-- Claws holding book -->
      <path d="M18 50 Q14 42 20 38" fill="none" stroke="var(--border-strong)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M62 50 Q66 42 60 38" fill="none" stroke="var(--border-strong)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Book on shell -->
      <rect x="30" y="42" width="20" height="14" rx="2" fill="var(--accent-2-soft)" stroke="var(--accent-2)" stroke-width="0.8"/>
      <line x1="34" y1="47" x2="46" y2="47" stroke="var(--text-muted)" stroke-width="0.8"/>
      <line x1="34" y1="50" x2="46" y2="50" stroke="var(--text-muted)" stroke-width="0.8"/>
      <!-- Legs -->
      <path d="M22 55 L18 62" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round"/>
      <path d="M30 57 L28 64" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 57 L52 64" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round"/>
      <path d="M58 55 L62 62" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- Mascot: Hermit Crab Reading (book held up) -->
    <symbol id="mascot-crab-reading" viewBox="0 0 80 80">
      <use xlink:href="#mascot-crab"/>
      <!-- Extra book held by claws in front -->
      <rect x="28" y="20" width="24" height="18" rx="2" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="0.8"/>
      <line x1="32" y1="26" x2="48" y2="26" stroke="var(--text-muted)" stroke-width="0.8"/>
      <line x1="32" y1="30" x2="48" y2="30" stroke="var(--text-muted)" stroke-width="0.8"/>
    </symbol>

    <!-- Mascot: Hermit Crab Excited (surprised/alarmed) -->
    <symbol id="mascot-crab-excited" viewBox="0 0 80 80">
      <use xlink:href="#mascot-crab"/>
      <!-- Bigger eyes (surprised) -->
      <circle cx="34" cy="30" r="4" fill="var(--text)"/>
      <circle cx="46" cy="30" r="4" fill="var(--text)"/>
      <circle cx="34" cy="29" r="1.5" fill="var(--bg)"/>
      <circle cx="46" cy="29" r="1.5" fill="var(--bg)"/>
      <!-- Open mouth -->
      <ellipse cx="40" cy="38" rx="3" ry="2" fill="var(--bg)"/>
      <!-- Raised claws -->
      <path d="M18 42 Q10 32 16 26" fill="none" stroke="var(--border-strong)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M62 42 Q70 32 64 26" fill="none" stroke="var(--border-strong)" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
  </svg>

  <div class="app-bg"></div>

  <!-- ═══ LAYOUT ═══ -->
  <div class="app" id="app-layout">

    <!-- Left Sidebar -->
    <nav class="sidebar">
      <!-- Sidebar Brand Header -->
      <div class="sidebar-brand">
        <div class="topbar-logo">
          <svg style="width: 22px; height: 22px;"><use xlink:href="#logo-crab-claw"></use></svg>
        </div>
        <div>
          <div class="topbar-title">NovelClaw</div>
          <div class="topbar-subtitle">โลกของนักอ่าน ไม่สิ้นสุด</div>
        </div>
        <button class="btn btn-icon btn-ghost" id="sidebar-close" title="ปิดแถบเมนู">
          <svg style="width: 16px; height: 16px; color: var(--text-secondary);"><use xlink:href="#icon-close"></use></svg>
        </button>
      </div>

      <div class="sidebar-section menu">
        <div class="section-label">เมนู</div>
        <div class="nav-item active" data-page="home">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-home"/></svg> หน้าหลัก
        </div>
        <div class="nav-item" data-page="library">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-library"/></svg> หอสมุด
        </div>
        <div class="nav-item" data-page="search">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-search"/></svg> ค้นหา
        </div>
        <div class="nav-item" data-page="ranking">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-ranking"/></svg> อันดับ
        </div>
        <div class="nav-divider"></div>
        <div class="nav-item" data-page="profile">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-profile"/></svg> โปรไฟล์
        </div>
        <div class="nav-item" data-page="history">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-history"/></svg> ประวัติ
        </div>
        <div class="nav-item" data-page="bookmarks">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-bookmarks"/></svg> บุ๊กมาร์ก
        </div>
        <div class="nav-divider"></div>
        <div class="nav-item" data-page="settings">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-settings"/></svg> ตั้งค่า
        </div>
        <div class="nav-item" data-page="admin">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-shield"/></svg> จัดการ
        </div>
      </div>

      <!-- Premium Upgrade Card -->
      <div class="sidebar-section premium">
        <div class="premium-card">
          <div class="premium-title">
            <svg style="width:16px;height:16px;margin-right:6px;vertical-align:middle;color:var(--accent);"><use xlink:href="#icon-crown"/></svg>
            Premium
          </div>
          <div class="premium-desc">ปลดล็อกการอ่านไม่จำกัด ไร้โฆษณา</div>
          <button class="btn btn-primary btn-sm btn-full premium-btn">อัปเกรด</button>
        </div>
      </div>

      <!-- Footer Action Toggles -->
      <div class="sidebar-section toggle-section">
        <div class="toggle-label">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-moon"/></svg>
          <span>Dark Theme</span>
        </div>
        <div class="toggle active" id="theme-toggle-new"></div>
      </div>

      <div class="sidebar-section toggle-section">
        <div class="toggle-label">
          <svg style="width:16px;height:16px;margin-right:8px;"><use xlink:href="#icon-book"/></svg>
          <span>AI Translate</span>
        </div>
        <div class="toggle active" id="translate-toggle-new"></div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
      <div class="main-header">
        <h2>
          <button class="btn btn-icon btn-ghost" id="sidebar-toggle" style="display: flex; align-items: center; justify-content: center;" title="เปิด/ปิดแถบเมนู">
            <svg style="width: 18px; height: 18px; color: var(--text-primary);"><use xlink:href="#icon-hamburger"></use></svg>
          </button>
          <span id="page-title">หน้าหลัก</span>
        </h2>
        <div class="topbar-right">
          <div class="topbar-status">
            <span class="status-dot online"></span>
            <span>online</span>
          </div>
          <button class="btn btn-icon btn-ghost" id="notif-btn" style="display: flex; align-items: center; justify-content: center;" title="การแจ้งเตือน">
            <svg style="width: 18px; height: 18px;"><use xlink:href="#icon-bell"></use></svg>
          </button>
          <div id="profile-avatar" class="profile-avatar"></div>
        </div>
      </div>

      <!-- Page Content -->
      <div class="page active" id="page-home">
        <!-- Rendered by page-renderers.js -->
      </div>
      <div class="page" id="page-novel-detail"></div>
      <div class="page" id="page-reader"></div>
      <div class="page" id="page-library"></div>
      <div class="page" id="page-search"></div>
      <div class="page" id="page-ranking"></div>
      <div class="page" id="page-profile"></div>
      <div class="page" id="page-history"></div>
      <div class="page" id="page-bookmarks"></div>
      <div class="page" id="page-downloads"></div>
      <div class="page" id="page-notifications"></div>
      <div class="page" id="page-settings"></div>
      <div class="page" id="page-admin"></div>
      <div class="page" id="page-admin-novels"></div>
      <div class="page" id="page-admin-chapters"></div>
      <div class="page" id="page-admin-translate"></div>
      <div class="page" id="page-admin-translate-job"></div>
      <div class="page" id="page-admin-novel-edit"></div>
      <div class="page" id="page-admin-users"></div>
      <div class="page" id="page-admin-glossary"></div>
    </main>

    <!-- Right Bar -->
    <aside class="rightbar" id="rightbar">
      <div class="rightbar-section">
        <div class="section-label">กิจกรรมล่าสุด</div>
        <div id="activity-feed">
          <p style="font-size:11px;color:var(--text-muted);">กำลังโหลด...</p>
        </div>
      </div>
      <div class="rightbar-section">
        <div class="section-label">ข้อมูล</div>
        <div id="route-params" style="font-size:11px;color:var(--text-muted);display:none;"></div>
      </div>
    </aside>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>
  <script src="/router.js"></script>
  <script src="/page-renderers.js"></script>
  <script src="/app.js"></script>
</body>
</html>
