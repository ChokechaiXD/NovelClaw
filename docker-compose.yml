services:
  novelclaw:
    build: .
    container_name: novelclaw
    ports:
      - "4173:4173"
    volumes:
      - ./novels:/app/novels:rw
      - ./logs:/app/logs:rw
    environment:
      NODE_ENV=production
      PORT=4173
      NOVELCLAW_ROOT=/app/novels
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4173/api/novels"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
