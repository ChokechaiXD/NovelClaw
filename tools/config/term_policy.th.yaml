# ── Pattern-based preservation ──
# Regex patterns: auto-preserve tokens matching these without adding each variant
preserve_patterns:
  level_notation:
    - '\bLV\.?\s*\d+\b'
    - '\bLVL\.?\s*\d+\b'
    - '\bLv\.?\s*\d+\b'
    - '\blv\.?\s*\d+\b'
  item_notation:
    - '\b[A-Z][a-z]+-\d+\b'
