name: NovelClaw CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install reader dependencies
        run: cd reader && npm install

      - name: Run quality check
        run: python tools/check_all.py

      - name: Schema validation
        run: python tools/validate_data.py --all

      - name: Summary
        run: echo "✅ NovelClaw CI completed"
