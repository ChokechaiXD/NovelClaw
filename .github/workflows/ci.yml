name: CI
on:
  push:
    branches: [main, gemini, claude]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  PYTHON_VERSION: "3.12"
jobs:
  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e .[test]
      - run: ruff check tools/ tests/ --output-format=github
      - run: ruff format tools/ tests/ --check
      - run: mypy tools/ --ignore-missing-imports --explicit-package-bases || true
      - run: python -m pytest tests/ -v --tb=short -x
      - run: python -m tools.glossary --sync --novel global-descent
  reader:
    name: Reader (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node -e "require("./server.js"); console.log("OK")"
