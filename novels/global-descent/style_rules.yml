punctuation:
- text: Use em-dash (—) for missing numbers in stat blocks.
- text: 'End marker: use (จบบท) in the last block of every chapter.'
- text: 'Source footer: *Source: ch N* (no novel title or author).'
- text: 'Paragraph spacing: single blank line between paragraphs.'
- text: 'Cleaning: no trailing whitespace, no tabs, final newline at end of files.'
naturalness:
- text: 'Filter words: remove รู้สึกว่า, คิดว่า, เชื่อว่า.'
- text: Replace -ๆ doubling (e.g., เดินช้าๆ) with more concise phrasing
- text: 'Elimination: drop unnecessary ของ, เป็น, คือ, แล้ว.'
- text: Anchor dialogue in small, involuntary physical actions; rotate paragraph entry
    points (dialogue-first, mid-action, sound/sensation)
policies:
- text: 'Scene Integrity: Keep all scene beats (openings, motivations, transitions,
    rewards, cliffhangers). Never skip or summarize explicit scenes.'
- text: 'Intimacy: Translate explicit content with euphemistic Thai (e.g., แนบ/สัมผัส/จูบ).'
- text: 'When in Doubt: When in doubt, prefer a lighter translation (แปลแบบเบา) combined
    with ellipses to imply the action rather than skipping it.'
